---
name: CI

on:
  pull_request: ~
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Slackware 12.0 / Python 2.5
            dockerfile: ci/12.0/Dockerfile
            image_tag: slackroll-ci:12.0-python2
            test_command: py.test -vv
            coverage: false
          - name: Slackware 13.37 / Python 2.6
            dockerfile: ci/13.37/Dockerfile
            image_tag: slackroll-ci:13.37-python2
            test_command: py.test -vv
            coverage: false
          - name: Slackware 15.0 / Python 2.7
            dockerfile: ci/15.0/Dockerfile
            image_tag: slackroll-ci:15.0-python2
            test_command: pytest --junitxml=pytest.xml --cov-report=term-missing:skip-covered --cov=slackroll -vv | tee pytest-coverage.txt
            coverage: true
    name: ${{ matrix.name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build CI Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.image_tag }}
          cache-from: type=gha,scope=${{ matrix.image_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_tag }}

      - name: Run tests
        run: |
          docker run --rm -v "$(pwd):/slackroll" -w /slackroll ${{ matrix.image_tag }} bash -o pipefail -c '${{ matrix.test_command }}'

      - name: Coverage
        if: github.event_name == 'pull_request' && matrix.coverage
        uses: MishaKav/pytest-coverage-comment@287292879eaaff04116f36d3eb1a670f6e5df1a4 # v1.7.1
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml
          default-branch: master

  lint:
    runs-on: ubuntu-24.04
    env:
      # renovate: datasource=pypi depName=pre-commit
      PRE_COMMIT_VERSION: "4.5.1"
      # renovate: datasource=github-releases depName=astral-sh/uv
      UV_VERSION: "0.11.6"
      # renovate: datasource=python-version depName=python
      PRE_COMMIT_PYTHON_VERSION: "3.14.4"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PRE_COMMIT_PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Configure pre-commit repo cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-${{ runner.arch }}-pre-commit-repo-${{
            env.pythonLocation }}-${{hashFiles('.pre-commit-config.yaml') }}

      - name: Configure pre-commit install cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: pre_commit_install_cache
        with:
          path: ~/.pre-commit-venv
          key: ${{ runner.os }}-${{ runner.arch }}-pre-commit-venv-${{
            env.PRE_COMMIT_VERSION }}-${{env.pythonLocation }}

      - name: Install pre-commit
        if: steps.pre_commit_install_cache.outputs.cache-hit != 'true'
        run: |
          python -m venv ~/.pre-commit-venv
          # shellcheck source=/dev/null
          . ~/.pre-commit-venv/bin/activate
          pip install pre-commit=='${{ env.PRE_COMMIT_VERSION }}'

      - name: Lint with pre-commit
        run: |
          # shellcheck source=/dev/null
          . ~/.pre-commit-venv/bin/activate
          pre-commit run --show-diff-on-failure --color=always --all-files
